version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: security_portfolio_db
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: security_portfolio
    ports:
      - "5438:5432" # Changed to 5438 to avoid conflicts
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always

volumes:
  postgres_data:
